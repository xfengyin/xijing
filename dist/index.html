  <!-- 新主题样式 -->
  
  <style>
    /* 加载动画 */
    #loading {
      position: fixed;
      inset: 0;
      background: #121212;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.5s ease;
    }
    
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-logo {
      font-size: 64px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b9d, #c44569);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
      letter-spacing: 8px;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 107, 157, 0.2);
      border-top-color: #ff6b9d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-text {
      color: #6a6a6a;
      font-size: 14px;
      margin-top: 24px;
      letter-spacing: 2px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 离线提示 */
    .offline-indicator {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
      color: white;
      text-align: center;
      padding: 12px;
      font-size: 14px;
      z-index: 100000;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }
    
    .offline-indicator.show {
      transform: translateY(0);
    }
  </style>
  <script type="module" crossorigin src="/assets/index-sklUzfkd.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-9VliyB1v.css">
</head>
<body>
  <!-- 离线提示 -->
  <div class="offline-indicator" id="offline-indicator">
    ⚠️ 网络已断开，部分内容可能无法加载

  <!-- 加载画面 -->
  <div id="loading">
    <div class="loading-logo">兮·境</div>
    <div class="loading-spinner"></div>

    </nav>

    <!-- 主内容区 -->

        </div>

      <!-- 中央内容 -->
      <section class="center-content">

          </div>
          
          <div class="hero-info">

        </div>

        <!-- 功能区 -->
        <div class="features-section">

            <div class="feature-card" data-feature="lyrics">

            </div>

            </div>
            <div class="feature-card" data-feature="ai">

            </div>

            </div>
            <div class="feature-card" data-feature="live">
              <div class="feature-icon">📺</div>
              <div class="feature-title">永恒直播间</div>
              <div class="feature-desc">24小时循环播放</div>
            </div>
            <div class="feature-card" data-feature="timeline">

            </div>
          </div>
        </div>

    <!-- 底部播放栏 -->
    <footer class="player-bar">

        </div>

      </div>

      <div class="player-controls">
        <div class="controls-buttons">
          <button class="control-btn small" id="btn-shuffle" title="随机">🔀</button>
          <button class="control-btn medium" id="btn-prev" title="上一首">⏮</button>
          <button class="control-btn play" id="btn-play" title="播放/暂停">▶</button>

          <div class="progress-bar" id="progress-bar">

            </div>

      <!-- 音量控制 -->

        <button class="extra-btn" id="btn-lyrics" title="歌词">🎤</button>
        <button class="extra-btn" id="btn-queue" title="播放队列">📝</button>

        <div class="volume-control">

            <div class="volume-fill" id="volume-fill"></div>
          </div>
        </div>

  <!-- 面板覆盖层 -->
  <div class="panel-overlay" id="panel-overlay">
    <div class="panel-content">
      <div class="panel-header">
        <h2 class="panel-title" id="panel-title">歌词</h2>
        <button class="panel-close" id="panel-close">×</button>
      </div>
      <div class="panel-body" id="panel-body">
        <!-- 动态内容 -->
      </div>
    </div>
  </div>

  <script>
    // 隐藏加载画面
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading')
        if (loading) {
          loading.classList.add('hidden')
          setTimeout(() => loading.remove(), 500)
        }
      }, 1500)
    })
    
    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('[PWA] Service Worker 注册成功:', registration.scope)
          })
          .catch(error => {
            console.error('[PWA] Service Worker 注册失败:', error)
          })
      })
    }
    
    // 网络状态监听
    const offlineIndicator = document.getElementById('offline-indicator')
    function updateOnlineStatus() {
      if (offlineIndicator) {
        offlineIndicator.classList.toggle('show', !navigator.onLine)
      }
    }
    window.addEventListener('online', updateOnlineStatus)
    window.addEventListener('offline', updateOnlineStatus)
    updateOnlineStatus()
  </script>
