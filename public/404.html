<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 | 兮·境</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #121212;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 48px; }
    .code {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b9d, #c44569);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    .message {
      font-size: 20px;
      color: #b3b3b3;
      margin-bottom: 32px;
    }
    .link {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #ff6b9d, #c44569);
      color: white;
      text-decoration: none;
      border-radius: 500px;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.15s ease;
    }
    .link:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="message">页面走丢了，但本兮的音乐永不散场</div>
    <a href="/" class="link">返回首页</a>
  </div>
</body>
</html>
