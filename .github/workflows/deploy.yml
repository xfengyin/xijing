name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-xijing-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-xijing-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy static assets
        run: |
          cp -r public/icons dist/icons
          cp -r public/lyrics dist/lyrics
          cp public/manifest.json dist/manifest.json
          cp public/sw.js dist/sw.js
          cp public/favicon.svg dist/favicon.svg
          cp public/404.html dist/404.html

      - name: Verify build output
        run: |
          echo "=== dist contents ===" && ls -la dist/ && echo "=== dist/icons ===" && ls dist/icons/ | head -5

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 构建完成后自动检查网站健康状态
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Check site availability
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.page_url || 'https://xfengyin.github.io/xijing' }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || echo "000")
          echo "Site HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Site is accessible"
          else
            echo "⚠️ Site returned code: $HTTP_CODE"
          fi
